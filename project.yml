name: KULMS
options:
  bundleIdPrefix: com.kulms
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  KULMS:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj"
          - "*.xcworkspace"
    info:
      path: Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.kulms.refresh
        UILaunchScreen: {}
    settings:
      base:
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        PRODUCT_BUNDLE_IDENTIFIER: com.kulms.app
        PRODUCT_NAME: KULMS
        INFOPLIST_KEY_CFBundleDisplayName: "KULMS+"
        MARKETING_VERSION: "1.1.1"
        CURRENT_PROJECT_VERSION: "8"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"

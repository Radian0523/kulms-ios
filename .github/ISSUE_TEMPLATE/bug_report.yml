name: Bug Report
description: バグの報告
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: バグの内容
      description: 何が起きたかを具体的に教えてください。
      placeholder: "例: 更新ボタンを押しても課題一覧が更新されない"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきかを教えてください。
      placeholder: "例: 最新の課題データが取得・表示される"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を教えてください。
      placeholder: |
        1. アプリを起動
        2. 更新ボタンをタップ
        3. エラーメッセージを確認
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: デバイス / iOS バージョン
      placeholder: "例: iPhone 15 / iOS 18.0"
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: その他
      description: スクリーンショットやXcodeコンソールログなど、参考になる情報があれば添付してください。
    validations:
      required: false
